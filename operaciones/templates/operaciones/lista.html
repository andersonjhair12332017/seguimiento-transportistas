{% extends "operaciones/base.html" %}

{% block title %}Seguimiento de Transportistas{% endblock title %}

{% block content %}
<div id="panel-auto">
    {% include "operaciones/_lista_panel.html" %}
</div>

<!-- Modal QR -->
<div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h5 class="modal-title fw-bold mb-0" id="qrModalLabel">Código QR del transportista</h5>
          <div id="qrModalPlaca" class="text-muted small"></div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body text-center">
        <img id="qrModalImg" class="qr-modal-img" alt="QR ampliado">
        <div id="qrModalCode" class="fw-bold fs-6 mt-2"></div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btnImprimirQr" class="btn btn-primary">Imprimir</button>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

{% block extra_js %}
<script>
(function () {
    const panelId = "panel-auto";
    const intervalVisible = 2000;
    const intervalHidden = 8000;
    let timerAuto = null;
    let timerVisual = null;
    let enCurso = false;

    // Datos del QR actualmente abierto en modal
    let qrActualSrc = "";
    let qrActualCodigo = "";
    let qrActualPlaca = "";

    function construirUrlParcial() {
        const url = new URL(window.location.href);
        url.searchParams.set("partial", "1");
        url.searchParams.set("_ts", Date.now().toString());
        return url.toString();
    }

    function updateTimestampBadge() {
        const el = document.getElementById("ultima-actualizacion");
        if (!el) return;

        const ts = Number(el.dataset.timestamp || 0);
        if (!ts) return;

        const sec = Math.max(0, Math.floor(Date.now() / 1000 - ts));
        el.textContent = sec < 2 ? "Actualizado hace un instante" : `Actualizado hace ${sec} s`;
    }

    function formatHMS(totalSeconds) {
        const total = Math.max(0, Math.floor(totalSeconds));
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        return `${String(h).padStart(2, "0")} h ${String(m).padStart(2, "0")} min ${String(s).padStart(2, "0")} s`;
    }

    function updateLiveTimers() {
        document.querySelectorAll(".live-timer").forEach((el) => {
            const base = Number(el.dataset.baseSeconds || 0);
            const renderedAt = Number(el.dataset.renderedAt || 0);
            const now = Math.floor(Date.now() / 1000);
            const total = base + Math.max(0, now - renderedAt);
            el.textContent = formatHMS(total);
        });

        updateTimestampBadge();
    }

    function abrirModalQr(src, codigo, placa) {
        qrActualSrc = src || "";
        qrActualCodigo = codigo || "";
        qrActualPlaca = placa || "";

        const img = document.getElementById("qrModalImg");
        const codeBox = document.getElementById("qrModalCode");
        const placaBox = document.getElementById("qrModalPlaca");

        if (img) img.src = qrActualSrc;
        if (codeBox) codeBox.textContent = qrActualCodigo ? `Código: ${qrActualCodigo}` : "";
        if (placaBox) placaBox.textContent = qrActualPlaca ? `Placa: ${qrActualPlaca}` : "";

        const modalEl = document.getElementById("qrModal");
        const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    }

    function imprimirQr() {
        if (!qrActualSrc) return;

        const w = window.open("", "_blank", "width=600,height=750");
        if (!w) return;

        const placa = qrActualPlaca || "";
        const codigo = qrActualCodigo || "";

        w.document.open();
        w.document.write(`
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Imprimir QR</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 24px; }
  img { max-width: 340px; width: 100%; height: auto; border: 1px solid #ddd; padding: 10px; border-radius: 10px; background:#fff; }
  .meta { margin-bottom: 14px; font-size: 16px; }
  .meta div { margin: 6px 0; }
</style>
</head>
<body>
  <div class="meta">
    <div><strong>Placa:</strong> ${placa}</div>
    <div><strong>Código:</strong> ${codigo}</div>
  </div>
  <img src="${qrActualSrc}" alt="QRdow.onload = function () {
      window.print();
      window.onafterprint = function () { window.close(); };
    };
  <\/script>
</body>
</html>
        `);
        w.document.close();
    }

    async function refrescarPanel() {
        if (enCurso) return;
        if (document.hidden) return;

        // Evita refrescar si el modal está abierto
        const modalEl = document.getElementById("qrModal");
        if (modalEl && modalEl.classList.contains("show")) return;

        const activo = document.activeElement;
        if (activo && ["INPUT", "TEXTAREA", "SELECT"].includes(activo.tagName)) {
            return;
        }

        enCurso = true;
        const panel = document.getElementById(panelId);

        try {
            const response = await fetch(construirUrlParcial(), {
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                    "Cache-Control": "no-cache"
                }
            });

            if (!response.ok) throw new Error("No fue posible actualizar el panel.");

            panel.innerHTML = await response.text();
            updateLiveTimers();
        } catch (error) {
            console.error("Error al actualizar el panel:", error);
        } finally {
            enCurso = false;
        }
    }

    function reiniciarTemporizadorAuto() {
        if (timerAuto) clearInterval(timerAuto);
        const actual = document.hidden ? intervalHidden : intervalVisible;
        timerAuto = setInterval(refrescarPanel, actual);
    }

    // ✅ Delegación de eventos: funciona incluso cuando el panel se refresca
    document.addEventListener("click", function (e) {
        const qrBtn = e.target.closest(".qr-thumb-btn");
        if (qrBtn) {
            e.preventDefault();
            abrirModalQr(qrBtn.dataset.qrSrc, qrBtn.dataset.qrCode, qrBtn.dataset.placa);
            return;
        }

        const btnRefresh = e.target.closest("#btn-refrescar-panel");
        if (btnRefresh) {
            e.preventDefault();
            refrescarPanel();
            return;
        }

        const btnPrint = e.target.closest("#btnImprimirQr");
        if (btnPrint) {
            e.preventDefault();
            imprimirQr();
            return;
        }
    });

    document.addEventListener("visibilitychange", reiniciarTemporizadorAuto);
    document.addEventListener("focusin", reiniciarTemporizadorAuto);
    document.addEventListener("focusout", reiniciarTemporizadorAuto);

    reiniciarTemporizadorAuto();
    timerVisual = setInterval(updateLiveTimers, 1000);
    updateLiveTimers();

document.getElementById("btnImprimirQr")?.addEventListener("click", function (e) {
  e.preventDefault();

  // Espera que el QR esté cargado antes de imprimir
  const img = document.getElementById("qrModalImg");

  if (img && !img.complete) {
    img.onload = function () {
      window.print(); // Igual que Ctrl+P
    };
    return;
  }

  window.print(); // Igual que Ctrl+P
});
})();
</script>
{% endblock extra_js %}
