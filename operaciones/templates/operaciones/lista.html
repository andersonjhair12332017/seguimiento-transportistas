{% extends 'operaciones/base.html' %}

{% block title %}Seguimiento de Transportistas{% endblock title %}

{% block content %}
<style>
    /* Área oculta solo para impresión */
    #qrPrintArea {
        display: none;
    }

    @media print {
        body.printing-qr > *:not(#qrPrintArea) {
            display: none !important;
        }

        body.printing-qr #qrPrintArea {
            display: flex !important;
            position: fixed;
            inset: 0;
            background: #ffffff;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        body.printing-qr {
            margin: 0 !important;
            padding: 0 !important;
            background: #ffffff !important;
        }

        @page {
            size: 58mm 78mm;
            margin: 0;
        }
    }

    .print-page {
        width: 58mm;
        height: 78mm;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffffff;
        box-sizing: border-box;
        padding: 4mm;
    }

    .print-sticker {
        width: 100%;
        border: 1px solid #d9d9d9;
        border-radius: 4mm;
        padding: 4mm 3mm 3mm 3mm;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #ffffff;
    }

    .print-sticker img {
        width: 40mm;
        height: 40mm;
        object-fit: contain;
        display: block;
    }

    .print-code {
        margin-top: 3mm;
        font-size: 11pt;
        font-weight: 700;
        color: #333333;
        letter-spacing: 0.6px;
        line-height: 1.2;
        word-break: break-word;
    }
</style>

<div id="panel-auto">
    {% include 'operaciones/_lista_panel.html' %}
</div>

<!-- Modal QR -->
<div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="qrModalLabel">Código QR del transportista</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body text-center">
                <img id="qrModalImg" src="" alt="Código QR" class="img-fluid mb-3 qr-modal-img">
                <div id="qrModalCode" class="fw-bold fs-5"></div>
            </div>
            <div class="modal-footer">
                <button type="button" id="btnImprimirQr" class="btn btn-primary">Imprimir</button>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<!-- Área real que se imprimirá -->
<div id="qrPrintArea" aria-hidden="true">
    <div class="print-page">
        <div class="print-sticker">
            <img id="qrPrintImg" src="" alt="Código QR para imprimir">
            <div id="qrPrintCode" class="print-code"></div>
        </div>
    </div>
</div>

<script>
(function () {
    const panelId = "panel-auto";
    let intervalVisible = 2000;
    let intervalHidden = 8000;
    let timerAuto = null;
    let timerVisual = null;
    let enCurso = false;

    let qrActualSrc = "";
    let qrActualCodigo = "";
    let imprimiendoQr = false;

    function guardarEstadoUI() {
        return {
            collapseAreas: document.getElementById("collapseAreas")?.classList.contains("show") || false
        };
    }

    function restaurarEstadoUI(estado) {
        const collapseAreas = document.getElementById("collapseAreas");
        const btnAreas = document.querySelector('[data-bs-target="#collapseAreas"]');

        if (collapseAreas) {
            collapseAreas.classList.toggle("show", !!estado.collapseAreas);
        }

        if (btnAreas) {
            btnAreas.classList.toggle("collapsed", !estado.collapseAreas);
            btnAreas.setAttribute("aria-expanded", estado.collapseAreas ? "true" : "false");
        }
    }

    function construirUrlParcial() {
        const url = new URL(window.location.href);
        url.searchParams.set("partial", "1");
        url.searchParams.set("_ts", Date.now().toString());
        return url.toString();
    }

    function updateTimestampBadge() {
        const el = document.getElementById("ultima-actualizacion");
        if (!el) return;

        const ts = Number(el.dataset.timestamp || 0);
        if (!ts) return;

        const sec = Math.max(0, Math.floor(Date.now() / 1000 - ts));
        el.textContent = sec < 2 ? "Actualizado hace un instante" : `Actualizado hace ${sec} s`;
    }

    function formatHMS(totalSeconds) {
        const total = Math.max(0, Math.floor(totalSeconds));
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        return `${String(h).padStart(2, "0")} h ${String(m).padStart(2, "0")} min ${String(s).padStart(2, "0")} s`;
    }

    function updateLiveTimers() {
        document.querySelectorAll(".live-timer").forEach((el) => {
            const base = Number(el.dataset.baseSeconds || 0);
            const renderedAt = Number(el.dataset.renderedAt || 0);
            const now = Math.floor(Date.now() / 1000);
            const total = base + Math.max(0, now - renderedAt);
            el.textContent = formatHMS(total);
        });

        updateTimestampBadge();
    }

    async function refrescarPanel() {
        if (enCurso || imprimiendoQr) return;
        if (document.hidden) return;

        const activo = document.activeElement;
        if (activo && ["INPUT", "TEXTAREA", "SELECT"].includes(activo.tagName)) {
            return;
        }

        enCurso = true;

        const panel = document.getElementById(panelId);
        const estado = guardarEstadoUI();

        try {
            const response = await fetch(construirUrlParcial(), {
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                    "Cache-Control": "no-cache"
                }
            });

            if (!response.ok) {
                throw new Error("No fue posible actualizar el panel.");
            }

            const html = await response.text();
            panel.innerHTML = html;
            restaurarEstadoUI(estado);
            updateLiveTimers();
        } catch (error) {
            console.error("Error al actualizar el panel:", error);
        } finally {
            enCurso = false;
        }
    }

    function reiniciarTemporizadorAuto() {
        if (timerAuto) {
            clearInterval(timerAuto);
        }

        const actual = document.hidden ? intervalHidden : intervalVisible;
        timerAuto = setInterval(refrescarPanel, actual);
    }

    function abrirModalQr(src, codigo) {
        qrActualSrc = src;
        qrActualCodigo = codigo;

        const img = document.getElementById("qrModalImg");
        const code = document.getElementById("qrModalCode");

        img.src = src;
        code.textContent = codigo;

        const modalEl = document.getElementById("qrModal");
        const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    }

    function esperarImagen(imgEl, timeoutMs = 2500) {
        return new Promise((resolve) => {
            if (imgEl.complete && imgEl.naturalWidth > 0) {
                resolve();
                return;
            }

            let terminado = false;

            const finalizar = () => {
                if (terminado) return;
                terminado = true;
                resolve();
            };

            imgEl.onload = finalizar;
            imgEl.onerror = finalizar;

            setTimeout(finalizar, timeoutMs);
        });
    }

    function limpiarModoImpresion() {
        document.body.classList.remove("printing-qr");
        imprimiendoQr = false;
        reiniciarTemporizadorAuto();
    }

    async function imprimirQrSticker() {
        if (!qrActualSrc || !qrActualCodigo || imprimiendoQr) return;

        imprimiendoQr = true;

        if (timerAuto) {
            clearInterval(timerAuto);
        }

        const imgPrint = document.getElementById("qrPrintImg");
        const codePrint = document.getElementById("qrPrintCode");

        imgPrint.src = qrActualSrc;
        codePrint.textContent = qrActualCodigo;

        await esperarImagen(imgPrint, 3000);

        document.body.classList.add("printing-qr");

        const afterPrintHandler = () => {
            window.removeEventListener("afterprint", afterPrintHandler);
            limpiarModoImpresion();
        };

        window.addEventListener("afterprint", afterPrintHandler);

        setTimeout(() => {
            window.print();

            setTimeout(() => {
                limpiarModoImpresion();
            }, 4000);
        }, 300);
    }

    document.addEventListener("visibilitychange", reiniciarTemporizadorAuto);
    document.addEventListener("focusin", reiniciarTemporizadorAuto);
    document.addEventListener("focusout", reiniciarTemporizadorAuto);

    document.addEventListener("click", function (e) {
        const btnRefresh = e.target.closest("#btn-refrescar-panel");
        if (btnRefresh) {
            e.preventDefault();
            refrescarPanel();
            return;
        }

        const qrThumb = e.target.closest(".qr-thumb-btn");
        if (qrThumb) {
            e.preventDefault();
            abrirModalQr(qrThumb.dataset.qrSrc, qrThumb.dataset.qrCode);
            return;
        }
    });

    const btnImprimir = document.getElementById("btnImprimirQr");
    if (btnImprimir) {
        btnImprimir.addEventListener("click", imprimirQrSticker);
    }

    reiniciarTemporizadorAuto();
    timerVisual = setInterval(updateLiveTimers, 1000);
    updateLiveTimers();
})();
</script>
{% endblock content %}
