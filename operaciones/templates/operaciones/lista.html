{% extends 'operaciones/base.html' %}
{% block title %}Seguimiento de Transportistas{% endblock %}

{% block content %}
<div id="panel-auto">
    {% include 'operaciones/_lista_panel.html' %}
</div>

<script>
(function () {
    const panelId = "panel-auto";
    const intervalMs = 5000;
    let enCurso = false;

    function guardarEstadoUI() {
        return {
            collapseEstados: document.getElementById("collapseEstados")?.classList.contains("show") || false,
            collapseAreas: document.getElementById("collapseAreas")?.classList.contains("show") || false
        };
    }

    function restaurarEstadoUI(estado) {
        const collapseEstados = document.getElementById("collapseEstados");
        const collapseAreas = document.getElementById("collapseAreas");
        const btnEstados = document.querySelector('[data-bs-target="#collapseEstados"]');
        const btnAreas = document.querySelector('[data-bs-target="#collapseAreas"]');

        if (collapseEstados) {
            collapseEstados.classList.toggle("show", !!estado.collapseEstados);
        }
        if (collapseAreas) {
            collapseAreas.classList.toggle("show", !!estado.collapseAreas);
        }
        if (btnEstados) {
            btnEstados.classList.toggle("collapsed", !estado.collapseEstados);
            btnEstados.setAttribute("aria-expanded", estado.collapseEstados ? "true" : "false");
        }
        if (btnAreas) {
            btnAreas.classList.toggle("collapsed", !estado.collapseAreas);
            btnAreas.setAttribute("aria-expanded", estado.collapseAreas ? "true" : "false");
        }
    }

    function construirUrlParcial() {
        const url = new URL(window.location.href);
        url.searchParams.set("partial", "1");
        url.searchParams.set("_ts", Date.now().toString());
        return url.toString();
    }

    async function refrescarPanel() {
        if (enCurso) return;
        if (document.hidden) return;

        const activo = document.activeElement;
        if (activo && ["INPUT", "TEXTAREA", "SELECT"].includes(activo.tagName)) {
            return;
        }

        enCurso = true;
        const panel = document.getElementById(panelId);
        const estado = guardarEstadoUI();

        try {
            const response = await fetch(construirUrlParcial(), {
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                    "Cache-Control": "no-cache"
                }
            });

            if (!response.ok) {
                throw new Error("No fue posible actualizar el panel.");
            }

            const html = await response.text();
            panel.innerHTML = html;
            restaurarEstadoUI(estado);
        } catch (error) {
            console.error("Error al actualizar el panel:", error);
        } finally {
            enCurso = false;
        }
    }

    setInterval(refrescarPanel, intervalMs);
})();
</script>
{% endblock %}
