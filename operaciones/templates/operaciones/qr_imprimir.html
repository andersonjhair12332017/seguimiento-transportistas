{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imprimir QR {{ transportista.qr }}</title>
    <style>
        @page {
            size: 58mm 78mm;
            margin: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 58mm;
            height: 78mm;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page {
            width: 58mm;
            height: 78mm;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 4mm;
            background: #ffffff;
        }

        .sticker {
            width: 100%;
            border: 1px solid #d9d9d9;
            border-radius: 4mm;
            padding: 4mm 3mm 3mm 3mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #ffffff;
        }

        .qr-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-wrap img {
            width: 40mm;
            height: 40mm;
            object-fit: contain;
            display: block;
        }

        .codigo {
            margin-top: 3mm;
            font-size: 11pt;
            font-weight: 700;
            color: #333333;
            letter-spacing: 0.6px;
            line-height: 1.2;
            word-break: break-word;
        }

        .acciones {
            display: none;
        }

        @media screen {
            html, body {
                width: 100%;
                height: 100%;
                background: #f3f4f6;
            }

            .page {
                width: 58mm;
                height: 78mm;
                margin: 20px auto;
                box-shadow: 0 0.25rem 1rem rgba(0, 0, 0, 0.18);
                border-radius: 6px;
            }

            .acciones {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-bottom: 20px;
            }

            .btn {
                border: 0;
                border-radius: 8px;
                padding: 10px 16px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
            }

            .btn-primary {
                background: #0d6efd;
                color: #fff;
            }

            .btn-secondary {
                background: #6c757d;
                color: #fff;
            }
        }
    </style>
</head>
<body>
    <div>
        <div class="acciones">
            <button class="btn btn-primary" type="button" onclick="window.print()">Imprimir</button>
            <button class="btn btn-secondary" type="button" onclick="window.close()">Cerrar</button>
        </div>

        <div class="page">
            <div class="sticker">
                <div class="qr-wrap">
                    <img id="printQrImage" src="{% url 'qr_png' transportista.qr %}?v={{ transportista.qr }}" alt="Código QR {{ transportista.qr }}">
                </div>
                <div class="codigo">{{ transportista.qr }}</div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        const img = document.getElementById("printQrImage");
        let impreso = false;

        function lanzarImpresion() {
            if (impreso) return;
            impreso = true;

            setTimeout(function () {
                window.focus();
                window.print();
            }, 250);
        }

        if (img.complete && img.naturalWidth > 0) {
            lanzarImpresion();
        } else {
            img.onload = lanzarImpresion;
            img.onerror = lanzarImpresion;

            // Fallback por si el navegador no dispara onload correctamente
            setTimeout(lanzarImpresion, 2000);
        }

        window.addEventListener("afterprint", function () {
            try {
                window.close();
            } catch (e) {
                // Si el navegador no permite cerrar, no hacemos nada
            }
        });
    })();
    </script>
</body>
</html>
