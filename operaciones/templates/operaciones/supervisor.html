{% extends 'operaciones/base.html' %}
{% block title %}Vista Supervisor{% endblock %}

{% block content %}
<div id="panel-supervisor">
    {% include 'operaciones/_supervisor_panel.html' %}
</div>

<script>
(function () {
    const panelId = "panel-supervisor";
    let intervalVisible = 2000;
    let intervalHidden = 10000;
    let timerAuto = null;
    let timerVisual = null;
    let enCurso = false;

    function construirUrlParcial() {
        const url = new URL(window.location.href);
        url.searchParams.set("partial", "1");
        url.searchParams.set("_ts", Date.now().toString());
        return url.toString();
    }

    function updateTimestampBadge() {
        const el = document.getElementById("ultima-actualizacion-supervisor");
        if (!el) return;
        const ts = Number(el.dataset.timestamp || 0);
        if (!ts) return;
        const sec = Math.max(0, Math.floor(Date.now() / 1000 - ts));
        el.textContent = sec < 2 ? "Actualizado hace un instante" : `Actualizado hace ${sec} s`;
    }

    function formatHMS(totalSeconds) {
        const total = Math.max(0, Math.floor(totalSeconds));
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        return `${String(h).padStart(2, "0")} h ${String(m).padStart(2, "0")} min ${String(s).padStart(2, "0")} s`;
    }

    function updateLiveTimers() {
        document.querySelectorAll(".live-timer").forEach((el) => {
            const base = Number(el.dataset.baseSeconds || 0);
            const renderedAt = Number(el.dataset.renderedAt || 0);
            const now = Math.floor(Date.now() / 1000);
            const total = base + Math.max(0, now - renderedAt);
            el.textContent = formatHMS(total);
        });
        updateTimestampBadge();
    }

    async function refrescarPanel() {
        if (enCurso) return;
        if (document.hidden) return;

        enCurso = true;
        const panel = document.getElementById(panelId);

        try {
            const response = await fetch(construirUrlParcial(), {
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                    "Cache-Control": "no-cache"
                }
            });

            if (!response.ok) {
                throw new Error("No fue posible actualizar supervisor.");
            }

            const html = await response.text();
            panel.innerHTML = html;
            updateLiveTimers();
        } catch (error) {
            console.error("Error al actualizar supervisor:", error);
        } finally {
            enCurso = false;
        }
    }

    function reiniciarTemporizadorAuto() {
        if (timerAuto) clearInterval(timerAuto);
        const actual = document.hidden ? intervalHidden : intervalVisible;
        timerAuto = setInterval(refrescarPanel, actual);
    }

    document.addEventListener("visibilitychange", reiniciarTemporizadorAuto);

    document.addEventListener("click", function (e) {
        const btn = e.target.closest("#btn-refrescar-supervisor");
        if (btn) {
            e.preventDefault();
            refrescarPanel();
        }
    });

    reiniciarTemporizadorAuto();
    timerVisual = setInterval(updateLiveTimers, 1000);
    updateLiveTimers();
})();
</script>
{% endblock %}
